<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Overflow Finder</title>
    <link rel="stylesheet" href="panel.css">
  </head>
  <body>
    <header class="toolbar">
      <button id="scan" class="primary">Scan</button>
      <label class="axis">
        Axis:
        <select id="axis">
          <option value="x" selected>Horizontal</option>
          <option value="y">Vertical</option>
          <option value="both">Both</option>
        </select>
      </label>
      <a id="restore-all" class="toolbar-link hidden" href="#" title="Restore all elements you've deleted in this scan session">Restore deleted ↺</a>
      <a id="open-fixtures" class="toolbar-link" href="#" title="Open the bundled test page in a new tab">Test page ↗</a>
    </header>

    <nav id="filter-bar" class="filter-bar hidden">
      <span class="filter-label">Show:</span>
      <button class="filter-chip active" data-kind="all">All <span class="count">0</span></button>
      <button class="filter-chip" data-kind="viewport">Viewport <span class="count">0</span></button>
      <button class="filter-chip filter-chip-clip" data-kind="clip">Clipped <span class="count">0</span></button>
      <button class="filter-chip" data-kind="scroll">Scroll <span class="count">0</span></button>
      <button class="filter-chip" data-kind="scroll-content">Intrinsic <span class="count">0</span></button>
      <label class="group-toggle" title="Collapse structurally-identical culprits (same tag, classes, and overflow type) into one card with a count">
        <input type="checkbox" id="group-similar" checked> Group similar
      </label>
    </nav>

    <div class="info">
      <span id="viewport" class="viewport"></span>
      <span id="status" class="status"></span>
    </div>

    <div id="empty" class="empty hidden">
      No overflow detected on this page.
    </div>

    <div id="results" class="results hidden"></div>

    <script src="panel.js"></script>
  </body>
</html>
